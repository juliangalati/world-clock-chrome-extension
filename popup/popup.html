<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #ffffff;
      --bg-input:     #ffffff;
      --bg-hover:     #f1f3f4;
      --text:         #202124;
      --text-secondary: #5f6368;
      --text-muted:   #80868b;
      --border:       #e8eaed;
      --border-input: #dadce0;
      --accent:       #1a73e8;
      --shadow:       rgba(60, 64, 67, 0.15);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:           #202124;
        --bg-input:     #292a2d;
        --bg-hover:     #3c4043;
        --text:         #e8eaed;
        --text-secondary: #9aa0a6;
        --text-muted:   #9aa0a6;
        --border:       #3c4043;
        --border-input: #5f6368;
        --accent:       #8ab4f8;
        --shadow:       rgba(0, 0, 0, 0.3);
      }
    }

    body {
      width: 280px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      font-size: 13px;
    }

    .clock {
      padding: 12px 16px;
    }

    .clock + .clock {
      border-top: 1px solid var(--border);
    }

    .label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 3px;
    }

    .time {
      font-size: 34px;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      line-height: 1.1;
      letter-spacing: -0.5px;
    }

    .date {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    #second-label {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    #second-label:hover {
      color: var(--accent);
    }

    #second-label::after {
      content: '▾';
      font-size: 9px;
      color: var(--text-muted);
    }

    #tz-search-container {
      display: none;
      margin-bottom: 6px;
    }

    #tz-search {
      width: 100%;
      border: 1px solid var(--border-input);
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      font-size: 13px;
      font-family: inherit;
      padding: 6px 8px;
      color: var(--text);
      background: var(--bg-input);
      outline: none;
    }

    #tz-search:focus {
      border-color: var(--accent);
      border-bottom: none;
      box-shadow: -1px 0 0 var(--accent), 1px 0 0 var(--accent), 0 -1px 0 var(--accent);
    }

    #tz-list {
      list-style: none;
      max-height: 160px;
      overflow-y: auto;
      border: 1px solid var(--border-input);
      border-top: none;
      border-radius: 0 0 4px 4px;
      background: var(--bg-input);
      box-shadow: 0 2px 6px var(--shadow);
    }

    #tz-list li {
      padding: 6px 8px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
    }

    #tz-list li:hover {
      background: var(--bg-hover);
    }
  </style>
</head>
<body>
  <div class="clock">
    <div class="label" id="local-label">Local</div>
    <div class="time" id="local-time">--:--:--</div>
    <div class="date" id="local-date"></div>
  </div>

  <div class="clock">
    <div class="label" id="second-label">Madrid</div>
    <div id="tz-search-container">
      <input id="tz-search" type="text" placeholder="Search city…" autocomplete="off">
      <ul id="tz-list"></ul>
    </div>
    <div class="time" id="second-time">--:--:--</div>
    <div class="date" id="second-date"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
