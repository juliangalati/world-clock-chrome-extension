<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 210px;
      padding: 16px;
      background: #0f0f1a;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .clock {
      padding: 10px 0;
    }

    .clock + .clock {
      border-top: 1px solid #222;
    }

    .label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 4px;
    }

    .time {
      font-size: 30px;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
      color: #fff;
      line-height: 1;
    }

    .date {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
    }

    #second-label {
      cursor: pointer;
    }

    #second-label:hover {
      color: #aaa;
    }

    #tz-search-container {
      display: none;
      margin-bottom: 4px;
    }

    #tz-search {
      width: 100%;
      background: #1a1a2e;
      color: #ccc;
      border: 1px solid #333;
      border-radius: 3px 3px 0 0;
      font-size: 11px;
      font-family: inherit;
      padding: 4px 6px;
      outline: none;
    }

    #tz-list {
      list-style: none;
      max-height: 120px;
      overflow-y: auto;
      border: 1px solid #333;
      border-top: none;
      border-radius: 0 0 3px 3px;
    }

    #tz-list li {
      padding: 3px 6px;
      font-size: 11px;
      color: #ccc;
      cursor: pointer;
    }

    #tz-list li:hover {
      background: #2a2a4e;
    }
  </style>
</head>
<body>
  <div class="clock">
    <div class="label" id="local-label">Local</div>
    <div class="time" id="local-time">--:--:--</div>
    <div class="date" id="local-date"></div>
  </div>

  <div class="clock">
    <div class="label" id="second-label">Madrid ▾</div>
    <div id="tz-search-container">
      <input id="tz-search" type="text" placeholder="Search city…" autocomplete="off">
      <ul id="tz-list"></ul>
    </div>
    <div class="time" id="second-time">--:--:--</div>
    <div class="date" id="second-date"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
