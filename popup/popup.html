<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      background: #ffffff;
      color: #202124;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      font-size: 13px;
    }

    .clock {
      padding: 12px 16px;
    }

    .clock + .clock {
      border-top: 1px solid #e8eaed;
    }

    .label {
      font-size: 11px;
      font-weight: 500;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 3px;
    }

    .time {
      font-size: 34px;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      color: #202124;
      line-height: 1.1;
      letter-spacing: -0.5px;
    }

    .date {
      font-size: 12px;
      color: #80868b;
      margin-top: 3px;
    }

    #second-label {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    #second-label:hover {
      color: #1a73e8;
    }

    #second-label::after {
      content: '▾';
      font-size: 9px;
      color: #80868b;
    }

    #tz-search-container {
      display: none;
      margin-bottom: 6px;
    }

    #tz-search {
      width: 100%;
      border: 1px solid #dadce0;
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      font-size: 13px;
      font-family: inherit;
      padding: 6px 8px;
      color: #202124;
      background: #fff;
      outline: none;
    }

    #tz-search:focus {
      border-color: #1a73e8;
      border-bottom: none;
      box-shadow: -1px 0 0 #1a73e8, 1px 0 0 #1a73e8, 0 -1px 0 #1a73e8;
    }

    #tz-list {
      list-style: none;
      max-height: 160px;
      overflow-y: auto;
      border: 1px solid #dadce0;
      border-top: none;
      border-radius: 0 0 4px 4px;
      box-shadow: 0 2px 6px rgba(60, 64, 67, 0.15);
    }

    #tz-search:focus + #tz-list,
    #tz-list {
      border-color: inherit;
    }

    #tz-list li {
      padding: 6px 8px;
      font-size: 13px;
      color: #202124;
      cursor: pointer;
    }

    #tz-list li:hover {
      background: #f1f3f4;
    }
  </style>
</head>
<body>
  <div class="clock">
    <div class="label" id="local-label">Local</div>
    <div class="time" id="local-time">--:--:--</div>
    <div class="date" id="local-date"></div>
  </div>

  <div class="clock">
    <div class="label" id="second-label">Madrid</div>
    <div id="tz-search-container">
      <input id="tz-search" type="text" placeholder="Search city…" autocomplete="off">
      <ul id="tz-list"></ul>
    </div>
    <div class="time" id="second-time">--:--:--</div>
    <div class="date" id="second-date"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
